    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const allClusters = document.querySelectorAll(".cluster");

            const API_BASE_URL_1 = "http://rua.local:5000";
            const API_BASE_URL_2 = "http://ruaextender.local:5000";

            // ------------------------------
            // ZONE MAPPING
            // ------------------------------
            const PI_1_ZONES = [
                "sb02", "sb03", "sb04", "al_ansar", "sb07", "sb08",
                "d01", "d09", "d10", "districts", "super_blocks"
            ];

            const PI_2_ZONES = [
                "crowd_corridor_1", "crowd_corridor_2", "crowd_corridor_3", "crowd_corridor_4", "crowd_corridor_5",
                "king_abdulaziz_road", "haram_boulevard", "al_amidah_road",
                "prince_mohammed_bin_salman_road", "salman_bin_abdulaziz_road",
                "substation_and_utilities", "masjid_al_haram", "district_cooling_plant_1",
                "crowd_corridors_all", "roadnames_surroundings", "main_roads"
            ];

            function getApiBaseUrl(zone) {
                if (PI_1_ZONES.includes(zone)) return API_BASE_URL_1;
                if (PI_2_ZONES.includes(zone)) return API_BASE_URL_2;
                return API_BASE_URL_1;
            }

            // ------------------------------
            // ZONE LAYER LOGIC (MULTI)
            // ------------------------------
            function toggleZoneLayer(zoneName, isActive) {
                const layer = document.getElementById(zoneName);
                if (!layer) return;

                layer.style.display = isActive ? "block" : "none";
            }

            // ------------------------------
            // API HELPERS
            // ------------------------------
            async function turnOnZone(zoneName) {
                const baseUrl = getApiBaseUrl(zoneName);
                try {
                    await fetch(`${baseUrl}/on_zone/${zoneName}`, {
                        method: 'POST'
                    });
                    await syncUIWithBackend();
                } catch (err) {
                    console.error("Error ON:", err);
                }
            }

            async function turnOffZone(zoneName) {
                const baseUrl = getApiBaseUrl(zoneName);
                try {
                    await fetch(`${baseUrl}/off_zone/${zoneName}`, {
                        method: 'POST'
                    });
                    await syncUIWithBackend();
                } catch (err) {
                    console.error("Error OFF:", err);
                }
            }

            // ------------------------------
            // 🔄 SYNC BOTH PIs
            // ------------------------------
            // let lastState = {};

            // async function syncUIWithBackend() {
            //     try {
            //         const [res1, res2] = await Promise.all([
            //             fetch(`${API_BASE_URL_1}/status`),
            //             fetch(`${API_BASE_URL_2}/status`)
            //         ]);

            //         const data1 = await res1.json();
            //         const data2 = await res2.json();

            //         const combined = {
            //             ...data1,
            //             ...data2
            //         };

            //         if (JSON.stringify(combined) === JSON.stringify(lastState)) return;
            //         lastState = combined;

            //         Object.entries(combined).forEach(([zone, state]) => {
            //             const isActive = state === "ON";

            //             toggleZoneLayer(zone, isActive);

            //             const checkbox = document.querySelector(`input[data-zone="${zone}"]`);
            //             if (checkbox) checkbox.checked = isActive;

            //             const button = document.querySelector(`.corridor-btn[data-zone="${zone}"]`);
            //             if (button) {
            //                 button.classList.toggle("active", isActive);
            //             }
            //         });

            //         // Sync masters
            //         allClusters.forEach(cluster => {
            //             const master = cluster.querySelector(".master input");

            //             if (cluster.dataset.type === "checkbox") {
            //                 const children = cluster.querySelectorAll(".toggle:not(.master) input");
            //                 master.checked = Array.from(children).every(cb => cb.checked);
            //             }

            //             if (cluster.dataset.type === "button") {
            //                 const buttons = cluster.querySelectorAll(".corridor-btn");
            //                 master.checked = Array.from(buttons).every(btn =>
            //                     btn.classList.contains("active")
            //                 );
            //             }
            //         });

            //     } catch (err) {
            //         console.error("Sync error:", err);
            //     }
            // }

            let lastState = {};

            // group mapping
            const mainRoadZones = [
                "king_abdulaziz_road",
                "haram_boulevard",
                "al_amidah_road",
                "prince_mohammed_bin_salman_road",
                "salman_bin_abdulaziz_road"
            ];

            async function syncUIWithBackend() {
                try {
                    const [res1, res2] = await Promise.all([
                        fetch(`${API_BASE_URL_1}/status`),
                        fetch(`${API_BASE_URL_2}/status`)
                    ]);

                    const data1 = await res1.json();
                    const data2 = await res2.json();

                    const combined = {
                        ...data1,
                        ...data2
                    };

                    if (JSON.stringify(combined) === JSON.stringify(lastState)) return;
                    lastState = combined;

                    // ✅ ORIGINAL behavior (do NOT remove)
                    Object.entries(combined).forEach(([zone, state]) => {
                        const isActive = String(state).toUpperCase() === "ON";

                        toggleZoneLayer(zone, isActive);

                        const checkbox = document.querySelector(`input[data-zone="${zone}"]`);
                        if (checkbox) checkbox.checked = isActive;

                        const button = document.querySelector(`.corridor-btn[data-zone="${zone}"]`);
                        if (button) {
                            button.classList.toggle("active", isActive);
                        }
                    });

                    // ✅ NEW: handle Main Roads as a virtual zone
                    const mainToggle = document.querySelector(`input[data-zone="main_roads"]`);

                    if (mainToggle) {
                        const allOn = mainRoadZones.every(zone =>
                            String(combined[zone]).toUpperCase() === "ON"
                        );

                        const allOff = mainRoadZones.every(zone =>
                            String(combined[zone]).toUpperCase() === "OFF"
                        );

                        // update UI properly
                        if (mainToggle.checked !== allOn) {
                            mainToggle.checked = allOn;
                        }

                        // optional UX (partial state)
                        mainToggle.indeterminate = !allOn && !allOff;
                    }

                    // ✅ keep cluster logic
                    allClusters.forEach(cluster => {
                        const master = cluster.querySelector(".master input");

                        if (!master) return;

                        if (cluster.dataset.type === "checkbox") {
                            const children = cluster.querySelectorAll(".toggle:not(.master) input");
                            if (children.length) {
                                master.checked = Array.from(children).every(cb => cb.checked);
                            }
                        }

                        if (cluster.dataset.type === "button") {
                            const buttons = cluster.querySelectorAll(".corridor-btn");
                            if (buttons.length) {
                                master.checked = Array.from(buttons).every(btn =>
                                    btn.classList.contains("active")
                                );
                            }
                        }
                    });

                } catch (err) {
                    console.error("Sync error:", err);
                }
            }
            syncUIWithBackend();
            // setInterval(syncUIWithBackend, 13000);

            // ------------------------------
            // CLUSTERS LOGIC
            // ------------------------------
            allClusters.forEach((cluster) => {
                const masterToggle = cluster.querySelector('.master input');

                // ==============================
                // CHECKBOX MODE
                // ==============================
                if (cluster.dataset.type === "checkbox") {
                    const children = cluster.querySelectorAll('.toggle:not(.master) input');

                    function syncMaster() {
                        masterToggle.checked = Array.from(children).every(cb => cb.checked);
                    }

                    // MASTER
                    masterToggle.addEventListener("click", async(e) => {
                        const isNowChecked = e.target.checked;
                        const clusterZone = e.target.dataset.zone;

                        children.forEach(cb => {
                            cb.checked = isNowChecked;
                            toggleZoneLayer(cb.dataset.zone, isNowChecked);
                        });

                        if (isNowChecked) await turnOnZone(clusterZone);
                        else await turnOffZone(clusterZone);
                    });

                    // CHILD
                    children.forEach(child => {
                        child.addEventListener("click", async(e) => {
                            const isNowChecked = e.target.checked;
                            const zoneName = e.target.dataset.zone;

                            toggleZoneLayer(zoneName, isNowChecked);

                            if (isNowChecked) await turnOnZone(zoneName);
                            else await turnOffZone(zoneName);

                            syncMaster();
                        });
                    });
                }

                // ==============================
                // BUTTON MODE
                // ==============================
                if (cluster.dataset.type === "button") {
                    const buttons = cluster.querySelectorAll(".corridor-btn");

                    function syncMaster() {
                        masterToggle.checked = Array.from(buttons).every(btn =>
                            btn.classList.contains("active")
                        );
                    }

                    // MASTER
                    masterToggle.addEventListener("click", async(e) => {
                        const isNowChecked = e.target.checked;
                        const clusterZone = e.target.dataset.zone;

                        buttons.forEach(btn => {
                            btn.classList.toggle("active", isNowChecked);
                            toggleZoneLayer(btn.dataset.zone, isNowChecked);
                        });

                        if (isNowChecked) await turnOnZone(clusterZone);
                        else await turnOffZone(clusterZone);
                    });

                    // BUTTON
                    buttons.forEach(btn => {
                        btn.addEventListener("click", async() => {
                            const isNowActive = btn.classList.contains("active");
                            const zoneName = btn.dataset.zone;

                            btn.classList.toggle("active", !isNowActive);
                            toggleZoneLayer(zoneName, !isNowActive);

                            if (!isNowActive) await turnOnZone(zoneName);
                            else await turnOffZone(zoneName);

                            syncMaster();
                        });
                    });
                }
            });
            document.addEventListener("visibilitychange", () => {
                if (!document.hidden) {
                    syncUIWithBackend(); // 🔥 refresh when user comes back
                }
            });
        });
    </script>

        .sidebar {

            background: #373a36;

            background-repeat: no-repeat;
            background-position: center;
        }
        /* RIGHT CONTENT AREA */
        
        .sidebar-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }
        /* Cluster blocks */
        
        .cluster {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .cluster-title {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
            font-family: "Majalla Bold", sans-serif;
            font-size: 38px;
            letter-spacing: 1px;
        }
        /* Toggle Switch */
        
        .toggle {
            display: flex;
            align-items: center;
            font-family: "Majalla", sans-serif;
            font-size: 22px;
            margin: 8px 0;
            cursor: pointer;
        }
        
        .toggle input {
            display: none;
        }
        /* Switch UI */
        
        .toggle span {
            width: 38px;
            height: 20px;
            background: #555;
            border-radius: 20px;
            margin-right: 10px;
            position: relative;
            transition: 0.3s;
        }
        
        .toggle span::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ccc;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }
        /* Checked state */
        
        .toggle input:checked+span {
            background: #bd9b60;
        }
        
        .toggle input:checked+span::before {
            transform: translateX(18px);
            background: white;
        }
        
        .corridor-options {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        
        .corridor-btn {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-family: "Majalla Bold", sans-serif;
            font-size: 22px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .corridor-btn.active {
            background: #d6b36a;
            color: #fff;
        }
        
        .corridor-btn:hover {
            background: #d6b36a;
        }
        
        .corridor-btn:disabled {
            opacity: 1;
            /* remove faded look */
            background: rgba(255, 255, 255, 0.1);
            /* keep same background */
            color: #fff;
            /* keep same text color */
            cursor: not-allowed;
            /* optional: show disabled cursor */
        }
        
        .corridor-btn.active:disabled {
            background: #d6b36a;
            color: #fff;
        }
        
        .roads-list {
            margin-left: 48px;
            /* aligns with text after toggle */
            font-family: "Majalla", sans-serif;
            font-size: 20px;
            color: #fff;
        }
        
        .roads-list p {
            margin: 4px 0;
        }
        
        .right-logo {
            position: absolute;
            top: 20px;
            /* adjust vertical position */
            right: 20px;
            /* stick to right side */
            width: 120px;
            /* adjust size */
            height: auto;
            z-index: 1000;
            /* ensure it's above other elements */
        }
